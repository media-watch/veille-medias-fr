name: Mise à jour des données Arcom & CDJM

on:
  schedule:
    - cron: "0 6 * * 1"  # Chaque lundi à 6h UTC
  workflow_dispatch:       # Déclenchement manuel possible

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les scrapers
        run: |
          python scraper.py
          python scraper_cdjm.py

      - name: Commit et push si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add decisions.json cdjm.json index.html
          git diff --staged --quiet || git commit -m "chore: mise à jour automatique des données Arcom et CDJM"
          git push
